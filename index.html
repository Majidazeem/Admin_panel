<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MA LEGEND | Admin</title>
    <!-- No icon, no og tags - intentionally blank -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg-color:#292d32;--text-main:#e0e5ec;--text-sub:#9baacf;--gold:#FFD700;--neon-green:#00ff88;--neon-blue:#00f3ff;--danger:#ff4757;--shadow-light:rgba(255,255,255,0.05);--shadow-dark:rgba(0,0,0,0.45);--shadow-flat:8px 8px 16px var(--shadow-dark),-8px -8px 16px var(--shadow-light);--shadow-pressed:inset 6px 6px 12px var(--shadow-dark),inset -6px -6px 12px var(--shadow-light);}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background-color:var(--bg-color);color:var(--text-main);min-height:100vh;}

        /* LOGIN PAGE */
        #loginPage{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-color);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
        .login-box{background:var(--bg-color);border-radius:35px;width:100%;max-width:400px;padding:50px 35px;box-shadow:var(--shadow-flat);text-align:center;}
        .login-icon{font-size:3.5rem;color:var(--gold);margin-bottom:20px;}
        .login-title{font-family:'Orbitron';color:var(--gold);font-size:1.3rem;margin-bottom:8px;}
        .login-sub{color:var(--text-sub);font-size:0.85rem;margin-bottom:30px;}
        .form-input{width:100%;background:var(--bg-color);border:none;color:var(--text-main);padding:16px 20px;border-radius:15px;font-size:1rem;outline:none;box-shadow:var(--shadow-pressed);font-family:'Poppins';margin-bottom:15px;}
        .form-input:focus{box-shadow:var(--shadow-pressed),0 0 0 2px var(--gold);}
        .btn-login{width:100%;padding:18px;border-radius:15px;border:none;font-weight:800;cursor:pointer;font-family:'Rajdhani';font-size:1.2rem;background:var(--bg-color);color:var(--gold);box-shadow:var(--shadow-flat);letter-spacing:2px;}
        .btn-login:active{box-shadow:var(--shadow-pressed);}
        .login-error{color:var(--danger);font-size:0.85rem;margin-top:10px;display:none;}
        .step-badge{display:inline-block;background:var(--bg-color);color:var(--neon-green);font-size:0.75rem;font-weight:800;letter-spacing:2px;padding:6px 16px;border-radius:20px;box-shadow:var(--shadow-pressed);margin-bottom:25px;}

        /* ADMIN PANEL */
        #adminPage{display:none;}
        .admin-header{background:var(--bg-color);padding:20px 25px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,0.3);position:sticky;top:0;z-index:100;}
        .admin-body{max-width:900px;margin:0 auto;padding:30px 20px 100px;}
        .admin-card{background:var(--bg-color);border-radius:25px;padding:30px;margin-bottom:25px;box-shadow:var(--shadow-flat);}
        .admin-card h3{color:var(--gold);font-family:'Orbitron';font-size:1rem;margin-bottom:25px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:15px;}
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;font-size:0.85rem;color:var(--text-sub);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
        .btn-admin{padding:16px 30px;border-radius:15px;border:none;font-weight:800;cursor:pointer;font-family:'Rajdhani';font-size:1.1rem;box-shadow:var(--shadow-flat);transition:0.2s;}
        .btn-admin:active{box-shadow:var(--shadow-pressed);transform:scale(0.97);}
        .btn-gold{background:var(--bg-color);color:var(--gold);}
        .btn-danger{background:var(--bg-color);color:var(--danger);}
        .btn-green{background:var(--bg-color);color:var(--neon-green);}
        .btn-nav-icon{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;background:var(--bg-color);color:var(--gold);cursor:pointer;font-size:1.2rem;box-shadow:var(--shadow-flat);border:none;}
        .btn-nav-icon:active{box-shadow:var(--shadow-pressed);}
        .pulsing-dot{width:10px;height:10px;background:var(--neon-green);border-radius:50%;box-shadow:0 0 10px var(--neon-green);animation:pulse 1.5s infinite;display:inline-block;}
        @keyframes pulse{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}
        .apps-list-admin{display:grid;gap:15px;}
        .app-item-admin{background:var(--bg-color);border-radius:20px;padding:20px;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow-pressed);}
        .app-item-admin img{width:60px;height:60px;border-radius:15px;object-fit:cover;box-shadow:var(--shadow-flat);}
        .app-item-admin .app-info{flex:1;}
        .app-item-admin .app-info h4{font-family:'Rajdhani';font-weight:800;font-size:1.1rem;}
        .app-item-admin .app-info p{font-size:0.8rem;color:var(--text-sub);margin-top:3px;}
        .app-actions{display:flex;gap:10px;}
        .btn-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:var(--shadow-flat);background:var(--bg-color);font-size:1rem;}
        .btn-icon:active{box-shadow:var(--shadow-pressed);}
        .btn-edit{color:var(--neon-blue);}.btn-del{color:var(--danger);}
        .tab-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
        .tab-btn{flex-shrink:0;padding:10px 18px;border-radius:20px;border:none;background:var(--bg-color);color:var(--text-sub);font-weight:bold;cursor:pointer;font-family:'Rajdhani';font-size:0.85rem;box-shadow:var(--shadow-flat);}
        .tab-btn.active{color:var(--gold);box-shadow:var(--shadow-pressed);}
        .badge-count{background:var(--gold);color:#000;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:900;margin-left:8px;}
        .admin-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-bottom:25px;}
        .stat-box{background:var(--bg-color);border-radius:20px;padding:20px;text-align:center;box-shadow:var(--shadow-flat);}
        .stat-box .num{font-family:'Orbitron';font-size:2rem;color:var(--gold);font-weight:900;}
        .stat-box .lbl{font-size:0.75rem;color:var(--text-sub);margin-top:5px;text-transform:uppercase;font-weight:700;}
        .empty-state{text-align:center;padding:40px 20px;color:var(--text-sub);}
        #toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--bg-color);color:var(--gold);padding:15px 35px;border-radius:50px;font-weight:900;z-index:9999;display:none;box-shadow:var(--shadow-flat);}
        select.form-input option{background:#292d32;}
        .icon-preview{margin-top:10px;display:none;}
        .icon-preview img{width:70px;height:70px;border-radius:15px;box-shadow:var(--shadow-flat);}
    </style>
</head>
<body>

<div id="toast"></div>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage">
    <div class="login-box">
        <div class="login-icon"><i class="fas fa-shield-halved"></i></div>
        <div class="login-title">ADMIN ACCESS</div>
        <div id="stepBadge" class="step-badge">STEP 1 — SECRET CODE</div>
        <input type="password" id="passInput" class="form-input" placeholder="Enter secret code..." onkeyup="if(event.key==='Enter')doLogin()">
        <button class="btn-login" onclick="doLogin()"><i class="fas fa-unlock"></i> VERIFY</button>
        <div class="login-error" id="loginErr"></div>
    </div>
</div>

<!-- ===== ADMIN PANEL ===== -->
<div id="adminPage">
    <div class="admin-header">
        <div style="display:flex;align-items:center;gap:12px;">
            <div>
                <div style="font-family:'Orbitron';color:var(--gold);font-size:1rem;">MA LEGEND ADMIN</div>
                <div style="font-size:0.7rem;color:var(--neon-green);display:flex;align-items:center;gap:5px;"><div class="pulsing-dot"></div> Firebase Connected</div>
            </div>
        </div>
        <button class="btn-nav-icon" onclick="doLogout()" title="Logout"><i class="fas fa-right-from-bracket"></i></button>
    </div>

    <div class="admin-body">
        <!-- STATS -->
        <div class="admin-stats">
            <div class="stat-box"><div class="num" id="statTotal">0</div><div class="lbl">Total</div></div>
            <div class="stat-box"><div class="num" id="statWA">0</div><div class="lbl">WA Mods</div></div>
            <div class="stat-box"><div class="num" id="statApps">0</div><div class="lbl">Apps</div></div>
            <div class="stat-box"><div class="num" id="statTools">0</div><div class="lbl">Tools</div></div>
        </div>

        <!-- ADD/EDIT FORM -->
        <div class="admin-card">
            <h3><i class="fas fa-plus-circle"></i><span id="formTitle">ADD NEW APP</span></h3>
            <input type="hidden" id="editId">
            <div class="form-row">
                <div class="form-group"><label>App Name *</label><input type="text" id="fName" class="form-input" placeholder="e.g. GBWhatsApp Pro"></div>
                <div class="form-group"><label>Version *</label><input type="text" id="fVersion" class="form-input" placeholder="e.g. v9.45 VIP"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Category *</label>
                    <select id="fCategory" class="form-input">
                        <option value="whatsapp">WA Mods</option>
                        <option value="apps">Apps</option>
                        <option value="tools">VIP Tools</option>
                        <option value="themes">XML Themes</option>
                    </select>
                </div>
                <div class="form-group"><label>File Size</label><input type="text" id="fSize" class="form-input" placeholder="e.g. 74 MB or Online"></div>
            </div>
            <div class="form-group">
                <label>App Icon URL *</label>
                <input type="url" id="fIcon" class="form-input" placeholder="https://i.postimg.cc/..." oninput="previewIcon(this.value)">
                <div class="icon-preview" id="iconPreview"><img id="iconPreviewImg"></div>
            </div>
            <div class="form-group"><label>Download Link *</label><input type="url" id="fLink" class="form-input" placeholder="https://www.mediafire.com/..."></div>
            <div class="form-group"><label>YouTube Video ID (optional)</label><input type="text" id="fVideo" class="form-input" placeholder="e.g. dQw4w9WgXcQ"></div>
            <div class="form-group"><label>Screenshots (one URL per line)</label><textarea id="fScreens" class="form-input" rows="3" placeholder="https://i.postimg.cc/..."></textarea></div>
            <div class="form-group"><label>Features (one per line)</label><textarea id="fFeatures" class="form-input" rows="3" placeholder="Anti-Ban Logic&#10;Ghost Mode"></textarea></div>
            <div class="form-group"><label>Changelog (one per line)</label><textarea id="fChangelog" class="form-input" rows="3" placeholder="Fixed Anti-Ban&#10;New Dark Theme"></textarea></div>
            <div style="display:flex;gap:15px;margin-top:10px;flex-wrap:wrap;">
                <button class="btn-admin btn-gold" onclick="saveApp()" style="flex:1;min-width:140px;"><i class="fas fa-save"></i> <span id="saveBtnText">SAVE APP</span></button>
                <button class="btn-admin btn-danger" onclick="resetForm()" style="flex:1;min-width:140px;"><i class="fas fa-times"></i> CANCEL</button>
            </div>
        </div>

        <!-- CHANGE PASSWORD -->
        <div class="admin-card">
            <h3><i class="fas fa-key"></i> CHANGE PASSWORD</h3>
            <div class="form-row">
                <div class="form-group"><label>Current Password</label><input type="password" id="curPass" class="form-input" placeholder="Current password"></div>
                <div class="form-group"><label>New Password</label><input type="password" id="newPass" class="form-input" placeholder="New password (min 6)"></div>
            </div>
            <button class="btn-admin btn-green" onclick="changePassword()"><i class="fas fa-lock"></i> UPDATE PASSWORD</button>
        </div>

        <!-- APPS LIST -->
        <div class="admin-card">
            <h3><i class="fas fa-list"></i> MANAGE APPS <span class="badge-count" id="adminAppCount">0</span></h3>
            <div class="tab-row">
                <button class="tab-btn active" onclick="filterList('all',this)">All</button>
                <button class="tab-btn" onclick="filterList('whatsapp',this)">WA Mods</button>
                <button class="tab-btn" onclick="filterList('apps',this)">Apps</button>
                <button class="tab-btn" onclick="filterList('tools',this)">Tools</button>
                <button class="tab-btn" onclick="filterList('themes',this)">Themes</button>
            </div>
            <div id="appsList" class="apps-list-admin"></div>
        </div>
    </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, remove, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://my-store-a63af-default-rtdb.firebaseio.com/" });
const db = getDatabase(app);
const AK = "apps";

window.appsData = [];

// Load apps
onValue(ref(db, AK), (snap) => {
    const d = snap.val();
    if (!d) { window.appsData = []; }
    else { window.appsData = Object.keys(d).map(k => ({firebaseKey:k,...d[k]})); }
    window.appsData.sort((a,b) => new Date(b.uploadDate)-new Date(a.uploadDate));
    updateStats();
    renderList('all');
});

window.saveApp = async function() {
    const name=document.getElementById('fName').value.trim(), version=document.getElementById('fVersion').value.trim(), category=document.getElementById('fCategory').value, size=document.getElementById('fSize').value.trim()||'N/A', icon=document.getElementById('fIcon').value.trim(), link=document.getElementById('fLink').value.trim(), video=document.getElementById('fVideo').value.trim(), screens=document.getElementById('fScreens').value.trim().split('\n').filter(s=>s.trim()), features=document.getElementById('fFeatures').value.trim().split('\n').filter(f=>f.trim()), changelog=document.getElementById('fChangelog').value.trim().split('\n').filter(c=>c.trim()), editId=document.getElementById('editId').value;
    if(!name||!version||!icon||!link){showToast('⚠️ Fill required fields!');return;}
    const appData={id:Date.now(),name,version,category,size,icon,link,video,screens:screens.length?screens:[icon],features:features.length?features:['Premium Features'],changelog:changelog.length?changelog:['Latest Update'],uploadDate:editId?(window.appsData.find(a=>a.firebaseKey===editId)?.uploadDate||new Date().toISOString()):new Date().toISOString()};
    try {
        if(editId){await set(ref(db,`${AK}/${editId}`),appData);showToast('✅ App Updated!');}
        else{const nr=push(ref(db,AK));await set(nr,appData);showToast('✅ App Added!');}
        resetForm();
    } catch(e){showToast('❌ Firebase Error!');}
};

window.deleteApp = async function(fk, nm) {
    if(!confirm('Delete "'+nm+'"?'))return;
    try{await remove(ref(db,`${AK}/${fk}`));showToast('🗑️ Deleted!');}
    catch(e){showToast('❌ Error!');}
};

window.editApp = function(fk) {
    const a=window.appsData.find(x=>x.firebaseKey===fk); if(!a)return;
    document.getElementById('editId').value=fk;
    document.getElementById('fName').value=a.name||'';
    document.getElementById('fVersion').value=a.version||'';
    document.getElementById('fCategory').value=a.category||'whatsapp';
    document.getElementById('fSize').value=a.size||'';
    document.getElementById('fIcon').value=a.icon||'';
    document.getElementById('fLink').value=a.link||'';
    document.getElementById('fVideo').value=a.video||'';
    document.getElementById('fScreens').value=(a.screens||[]).join('\n');
    document.getElementById('fFeatures').value=(a.features||[]).join('\n');
    document.getElementById('fChangelog').value=(a.changelog||[]).join('\n');
    document.getElementById('formTitle').innerText='EDIT APP';
    document.getElementById('saveBtnText').innerText='UPDATE APP';
    if(a.icon){document.getElementById('iconPreviewImg').src=a.icon;document.getElementById('iconPreview').style.display='block';}
    document.querySelector('.admin-card').scrollIntoView({behavior:'smooth'});
};
</script>

<script>
window.appsData = window.appsData || [];
var _loginStep = 1;
var SECRET_CODE = 'ml2026';

function doLogin() {
    var input = document.getElementById('passInput').value;
    var err = document.getElementById('loginErr');
    if (_loginStep === 1) {
        if (input === SECRET_CODE) {
            _loginStep = 2;
            document.getElementById('passInput').value = '';
            document.getElementById('passInput').placeholder = 'Enter password...';
            document.getElementById('stepBadge').innerText = 'STEP 2 — PASSWORD';
            err.style.display = 'none';
        } else {
            err.innerText = '❌ Wrong secret code!';
            err.style.display = 'block';
            document.getElementById('passInput').value = '';
        }
    } else {
        var stored = localStorage.getItem('ma_admin_pass') || 'malegend123';
        if (input === stored) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPage').style.display = 'block';
            err.style.display = 'none';
        } else {
            err.innerText = '❌ Wrong password!';
            err.style.display = 'block';
            document.getElementById('passInput').value = '';
        }
    }
}

function doLogout() {
    _loginStep = 1;
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').placeholder = 'Enter secret code...';
    document.getElementById('stepBadge').innerText = 'STEP 1 — SECRET CODE';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('adminPage').style.display = 'none';
    document.getElementById('loginErr').style.display = 'none';
}

function changePassword() {
    var cur=document.getElementById('curPass').value, newp=document.getElementById('newPass').value, stored=localStorage.getItem('ma_admin_pass')||'malegend123';
    if(!cur||!newp){showToast('⚠️ Fill both fields!');return;}
    if(cur!==stored){showToast('❌ Wrong current password!');return;}
    if(newp.length<6){showToast('⚠️ Min 6 characters!');return;}
    localStorage.setItem('ma_admin_pass',newp);
    showToast('✅ Password Changed!');
    document.getElementById('curPass').value='';
    document.getElementById('newPass').value='';
}

function updateStats() {
    var all=window.appsData;
    document.getElementById('statTotal').innerText=all.length;
    document.getElementById('statWA').innerText=all.filter(function(a){return a.category==='whatsapp';}).length;
    document.getElementById('statApps').innerText=all.filter(function(a){return a.category==='apps';}).length;
    document.getElementById('statTools').innerText=all.filter(function(a){return a.category==='tools';}).length;
    document.getElementById('adminAppCount').innerText=all.length;
}

function renderList(filter) {
    var list=document.getElementById('appsList');
    var data=filter==='all'?window.appsData:window.appsData.filter(function(a){return a.category===filter;});
    if(!data.length){list.innerHTML='<div class="empty-state"><p>No apps found</p></div>';return;}
    list.innerHTML=data.map(function(app){
        return '<div class="app-item-admin"><img src="'+app.icon+'" onerror="this.src=\'https://i.postimg.cc/SYY94wTH/20260101-082111.jpg\'"><div class="app-info"><h4>'+app.name+'</h4><p>'+app.version+' &bull; '+app.category+'</p></div><div class="app-actions"><button class="btn-icon btn-edit" onclick="editApp(\''+app.firebaseKey+'\')"><i class="fas fa-pen"></i></button><button class="btn-icon btn-del" onclick="deleteApp(\''+app.firebaseKey+'\',\''+app.name.replace(/'/g,"\\'")+'\')"><i class="fas fa-trash"></i></button></div></div>';
    }).join('');
}

function filterList(f,b){document.querySelectorAll('.tab-row .tab-btn').forEach(function(x){x.classList.remove('active');});if(b)b.classList.add('active');renderList(f);}
function resetForm(){['editId','fName','fVersion','fSize','fIcon','fLink','fVideo','fScreens','fFeatures','fChangelog'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('fCategory').value='whatsapp';document.getElementById('formTitle').innerText='ADD NEW APP';document.getElementById('saveBtnText').innerText='SAVE APP';document.getElementById('iconPreview').style.display='none';}
function previewIcon(url){if(url){document.getElementById('iconPreviewImg').src=url;document.getElementById('iconPreview').style.display='block';}}
function showToast(msg){var t=document.getElementById('toast');t.style.display='block';t.innerText=msg;setTimeout(function(){t.style.display='none';},2500);}
</script>
</body>
</html>
